:root{
  --ink:#1f2937; --muted:#6b7280; --bg:#f6f7fb; --card:#fff; --accent:#8b5cf6;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{font-family:"Yu Gothic UI","Hiragino Sans","Meiryo",sans-serif; color:var(--ink); background:var(--bg); display:flex; flex-direction:column;}
header.appbar{background:var(--accent); color:#fff; padding:8px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; z-index:1100;}
header.appbar h1{font-size:15px; font-weight:bold; flex:1; min-width:180px;}
header.appbar a{color:#ede9fe; font-size:12px; text-decoration:none;}
header.appbar a:hover{text-decoration:underline;}
.toolbar{display:flex; gap:6px; flex-wrap:wrap;}
.toolbar button, .toolbar label.filebtn{font-family:inherit; font-size:12px; font-weight:bold; border:none; border-radius:8px; padding:6px 10px; cursor:pointer; background:rgba(255,255,255,.18); color:#fff;}
.toolbar button:hover, .toolbar label.filebtn:hover{background:rgba(255,255,255,.32);}
.toolbar a.dlbtn{font-size:12px; font-weight:bold; border-radius:8px; padding:6px 10px; background:rgba(255,255,255,.18); color:#fff !important; text-decoration:none;}
.toolbar a.dlbtn:hover{background:rgba(255,255,255,.32); text-decoration:none;}
.toolbar input[type=file]{display:none;}
#map{flex:1; min-height:0;}
.samplebar{background:#fffbeb; border-bottom:1.5px solid #f59e0b; color:#92400e; font-size:12px; padding:5px 12px; text-align:center;}
.leaflet-popup-content{font-size:13px; line-height:1.7;}
.leaflet-popup-content select, .leaflet-popup-content input[type=text], .leaflet-popup-content textarea{font-family:inherit; font-size:12.5px; width:100%; border:1px solid #d1d5db; border-radius:6px; padding:4px 6px; margin:2px 0 6px;}
.leaflet-popup-content button{font-family:inherit; font-size:12px; font-weight:bold; border:none; border-radius:6px; padding:5px 12px; cursor:pointer; margin-right:6px;}
.popupSave{background:var(--accent); color:#fff;}
.popupDel{background:#fee2e2; color:#b91c1c;}
.statbox{background:rgba(255,255,255,.94); border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.25); padding:8px 12px; font-size:12px; line-height:1.6;}
.statbox b{font-size:17px;}
.legend{background:rgba(255,255,255,.94); border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.25); padding:8px 12px; font-size:12px; line-height:1.9;}
.legend i{display:inline-block; width:12px; height:12px; border-radius:50%; border:1px solid #333; margin-right:6px; vertical-align:-1px;}
.legend i.sq{border-radius:3px;}
.locateBtn{background:#fff; border:2px solid rgba(0,0,0,.25); border-radius:6px; width:34px; height:34px; font-size:17px; cursor:pointer;}
.guideBtn{background:#fff; border:2px solid rgba(0,0,0,.25); border-radius:6px; width:34px; height:34px; font-size:17px; cursor:pointer; font-weight:bold; color:var(--accent);}
.guideBtn.on{background:var(--accent); color:#fff;}
.guidePanel{position:absolute; top:12px; right:12px; z-index:1200; width:min(480px, calc(100% - 24px)); max-height:calc(100% - 24px); overflow-y:auto; background:rgba(255,255,255,.97); border:1.5px solid var(--accent); border-radius:14px; box-shadow:0 4px 18px rgba(0,0,0,.25); padding:14px 16px 12px; font-size:13px; line-height:1.7;}
.guidePanel h2{font-size:14.5px; color:var(--accent); margin-bottom:8px; padding-right:28px;}
.guidePanel ol{padding-left:20px; margin-bottom:8px;}
.guidePanel ol li{margin-bottom:4px;}
.guidePanel .gNote{font-size:11.5px; color:var(--muted); border-top:1px solid #e5e7eb; padding-top:6px;}
.guidePanel .gVideo{display:block; width:100%; height:auto; border:1px solid #e5e7eb; border-radius:8px; margin:4px 0 8px; cursor:zoom-in;}
.guidePanel .gVideoWrap{position:relative; margin:4px 0 8px;}
.guidePanel .gVideoWrap .gVideo{margin:0;}
.gVideoHint{position:absolute; top:8px; right:8px; background:var(--accent); color:#fff; font-size:11.5px; font-weight:bold; padding:4px 11px; border-radius:99px; box-shadow:0 2px 6px rgba(0,0,0,.35); pointer-events:none; white-space:nowrap;}
.gVideoHint::after{content:""; position:absolute; bottom:-5px; right:16px; border:6px solid transparent; border-top:6px solid var(--accent); border-bottom:0;}
.guidePanel .gVideoCap{font-size:11px; color:var(--muted); margin:-4px 0 8px;}
.gLightbox{position:fixed; inset:0; z-index:3000; background:rgba(0,0,0,.78); display:flex; align-items:center; justify-content:center; padding:16px; cursor:zoom-out;}
.gLightbox img, .gLightbox video{width:96%; height:auto; max-height:94vh; object-fit:contain; border-radius:10px; box-shadow:0 8px 40px rgba(0,0,0,.6); background:#fff;}
.gLightbox .gLbClose{position:absolute; top:14px; right:20px; border:none; background:none; color:#fff; font-size:30px; cursor:pointer; line-height:1;}
.guideClose{position:absolute; top:8px; right:10px; border:none; background:none; font-size:18px; cursor:pointer; color:var(--muted); line-height:1;}
.guideClose:hover{color:var(--ink);}
@media (max-height:500px){ .guidePanel{max-height:calc(100% - 24px); overflow-y:auto;} }

<script>
/* 共通ユーティリティ(ポスターマップ/ポスティングマップ) */
"use strict";

/* ---- ベース地図 ---- */
function createBaseLayers() {
  const gsiPale = L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: '&copy; <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
  });
  const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  });
  const gsiPhoto = L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg", {
    maxZoom: 18,
    attribution: '&copy; <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
  });
  return { "地理院地図(淡色)": gsiPale, "OpenStreetMap": osm, "航空写真(地理院)": gsiPhoto };
}

/* ---- 現在地ボタン ---- */
function addLocateControl(map) {
  const ctl = L.control({ position: "topleft" });
  ctl.onAdd = () => {
    const btn = L.DomUtil.create("button", "locateBtn");
    btn.textContent = "📍";
    btn.title = "現在地を表示";
    L.DomEvent.disableClickPropagation(btn);
    btn.onclick = () => map.locate({ setView: true, maxZoom: 16 });
    return btn;
  };
  ctl.addTo(map);
  let locMarker = null;
  map.on("locationfound", (e) => {
    if (locMarker) map.removeLayer(locMarker);
    locMarker = L.circleMarker(e.latlng, { radius: 7, color: "#fff", weight: 2, fillColor: "#1a73e8", fillOpacity: 1 }).addTo(map);
  });
  map.on("locationerror", () => alert("現在地を取得できませんでした(位置情報の許可を確認してください)"));
}

/* ---- 使い方ガイド(毎回初期表示、❓ボタンで開閉) ---- */
function addGuideControl(map, titleHtml, bodyHtml, storageKey) {
  const container = map.getContainer();

  const panel = document.createElement("div");
  panel.className = "guidePanel";
  panel.style.display = "none";
  panel.innerHTML = `<button class="guideClose" title="ガイドを閉じる" aria-label="ガイドを閉じる">✕</button><h2>${titleHtml}</h2>${bodyHtml}`;
  container.appendChild(panel);
  L.DomEvent.disableClickPropagation(panel);
  L.DomEvent.disableScrollPropagation(panel);

  let btn;
  function setOpen(open) {
    panel.style.display = open ? "block" : "none";
    if (btn) btn.classList.toggle("on", open);
  }
  panel.querySelector(".guideClose").onclick = () => setOpen(false);

  /* デモ動画: 吹き出し(PC=クリック/スマホ=タップ)+クリックで全画面表示 */
  const isTouch = window.matchMedia("(hover: none), (pointer: coarse)").matches;
  panel.querySelectorAll(".gVideo").forEach((media) => {
    const wrap = document.createElement("div");
    wrap.className = "gVideoWrap";
    media.parentNode.insertBefore(wrap, media);
    wrap.appendChild(media);
    const hint = document.createElement("span");
    hint.className = "gVideoHint";
    hint.textContent = isTouch ? "👆 タップで拡大" : "🖱️ クリックで拡大";
    wrap.appendChild(hint);
    if (media.tagName === "VIDEO") {
      // 自動再生がブラウザ都合で止まった場合に再開する保険
      const ensurePlay = () => { if (!document.hidden && media.paused) media.play().catch(() => {}); };
      media.addEventListener("loadeddata", ensurePlay);
      media.addEventListener("pause", ensurePlay);
      document.addEventListener("visibilitychange", ensurePlay);
      ensurePlay();
    }
    media.addEventListener("click", () => {
      const lb = document.createElement("div");
      lb.className = "gLightbox";
      let big;
      if (media.tagName === "VIDEO") {
        big = document.createElement("video");
        big.src = media.currentSrc || media.src;
        big.autoplay = true;
        big.muted = true;
        big.loop = true;
        big.playsInline = true;
      } else {
        big = document.createElement("img");
        big.src = media.src;
        big.alt = media.alt || "操作デモ(拡大)";
      }
      const close = document.createElement("button");
      close.className = "gLbClose";
      close.title = "閉じる";
      close.setAttribute("aria-label", "閉じる");
      close.textContent = "✕";
      lb.append(big, close);
      lb.addEventListener("click", () => lb.remove());
      document.body.appendChild(lb);
    });
  });

  const ctl = L.control({ position: "topleft" });
  ctl.onAdd = () => {
    btn = L.DomUtil.create("button", "guideBtn");
    btn.textContent = "❓";
    btn.title = "使い方ガイドを表示/非表示";
    L.DomEvent.disableClickPropagation(btn);
    btn.onclick = () => setOpen(panel.style.display === "none");
    return btn;
  };
  ctl.addTo(map);

  setOpen(true);
}

/* ---- localStorage ---- */
function loadLocal(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveLocal(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

/* ---- ファイル入出力 ---- */
function downloadFile(filename, text, mime) {
  const blob = new Blob([text], { type: mime || "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
function onFileSelected(inputEl, handler) {
  inputEl.addEventListener("change", () => {
    const f = inputEl.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      handler(reader.result, f.name);
      inputEl.value = ""; // 同じファイルの再選択を許可
    };
    reader.readAsText(f, "utf-8");
  });
}

/* ---- CSV (RFC4180の範囲で簡易対応) ---- */
function parseCsv(text) {
  const rows = [];
  let row = [], field = "", inQ = false;
  const src = text.replace(/^﻿/, "");
  for (let i = 0; i < src.length; i++) {
    const c = src[i];
    if (inQ) {
      if (c === '"') {
        if (src[i + 1] === '"') { field += '"'; i++; } else { inQ = false; }
      } else field += c;
    } else if (c === '"') inQ = true;
    else if (c === ",") { row.push(field); field = ""; }
    else if (c === "\n" || c === "\r") {
      if (c === "\r" && src[i + 1] === "\n") i++;
      row.push(field); field = "";
      if (row.some((v) => v !== "")) rows.push(row);
      row = [];
    } else field += c;
  }
  row.push(field);
  if (row.some((v) => v !== "")) rows.push(row);
  return rows;
}
function toCsv(rows) {
  const esc = (v) => {
    const s = String(v == null ? "" : v);
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  return rows.map((r) => r.map(esc).join(",")).join("\r\n");
}
function todayStamp() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}`;
}

</script>

<script>
"use strict";
/* ステータス定義(ここを書き換えれば増減可能) */
const STATUSES = [
  { id: 0, label: "未",     color: "#1e88e5" },
  { id: 1, label: "完了",   color: "#8b5cf6" },
  { id: 2, label: "予約",   color: "#fdd835" },
  { id: 3, label: "要確認", color: "#fb8c00" },
  { id: 4, label: "異常",   color: "#e53935" },
];
const KEY_BOARDS = "posterMap.boards";   // CSV読込後のデータ一式
const KEY_EDITS  = "posterMap.edits";    // サンプルデータへの編集差分 {id:{status,note}}

const map = L.map("map", { preferCanvas: true }).setView([35.7295, 139.7109], 14);
const baseLayers = createBaseLayers();
baseLayers["地理院地図(淡色)"].addTo(map);
const statusLayers = {};
STATUSES.forEach(s => { statusLayers[s.label] = L.layerGroup().addTo(map); });
L.control.layers(baseLayers, statusLayers, { collapsed: true }).addTo(map);
addLocateControl(map);
L.control.scale({ imperial: false }).addTo(map);
addGuideControl(map, "🗺️ ポスターマップの使い方",
  `<ol>
    <li><b>掲示場データを読み込む</b> — 右上「📂 CSV読込」で選管公表の掲示場一覧CSVを読込(緯度・経度列が必要。今の表示はダミーのサンプル)</li>
    <li><b>ピンをタップ</b> — ステータス(未/完了/予約/要確認/異常)とメモを保存。色が変わり右上の完了率も更新されます</li>
    <li><b>表示を絞る</b> — 右上のレイヤボタンでステータス別に表示切替、左の📍で現在地表示</li>
    <li><b>共有・バックアップ</b> — 「💾 CSV書出」で保存し、メンバーはそのCSVを「読込」すると同じ状態を再現できます</li>
  </ol>
  <video class="gVideo" src="https://yukinobu-nakamura.github.io/senkyo-maps/assets/poster_demo.mp4?v=2" autoplay muted loop playsinline width="2560" height="1262" aria-label="操作デモ: ピンをタップしてステータスとメモを保存すると色と完了率が更新される"></video>
  <div class="gVideoCap">▲ 操作デモ(ズーム→ピンをタップ→ステータス・メモを保存)</div>
  <div class="gNote">データはこの端末(ブラウザ)内にのみ保存されます。左上の❓でこのガイドを閉じたり再表示したりできます。</div>`,
  "posterMap");

/* 進捗ボックス */
const statCtl = L.control({ position: "topright" });
let statDiv;
statCtl.onAdd = () => { statDiv = L.DomUtil.create("div", "statbox"); return statDiv; };
statCtl.addTo(map);

/* 凡例 */
const legendCtl = L.control({ position: "bottomright" });
legendCtl.onAdd = () => {
  const div = L.DomUtil.create("div", "legend");
  div.innerHTML = STATUSES.map(s => `<i style="background:${s.color}"></i>${s.label}`).join("<br>");
  return div;
};
legendCtl.addTo(map);

let boards = [];
let usingSample = true;

function statusOf(id) { return STATUSES.find(s => s.id === Number(id)) || STATUSES[0]; }

function renderStats() {
  const total = boards.length;
  const done = boards.filter(b => b.status === 1).length;
  const pct = total ? ((done / total) * 100).toFixed(1) : "0.0";
  statDiv.innerHTML = `完了率 <b>${pct}%</b><br>${done} / ${total} ヶ所(残り ${total - done})`;
}

function popupHtml(b) {
  const opts = STATUSES.map(s => `<option value="${s.id}" ${s.id === b.status ? "selected" : ""}>${s.label}</option>`).join("");
  return `<b>${b.name}</b><br>${b.address || ""}<br>` +
    `<a href="https://www.google.com/maps/search/${b.lat},+${b.long}" target="_blank" rel="noopener noreferrer">Googleマップで開く</a><br>` +
    `ステータス:<select id="pStatus">${opts}</select>` +
    `メモ:<input type="text" id="pNote" value="${(b.note || "").replace(/"/g, "&quot;")}" maxlength="100">` +
    `<button class="popupSave" id="pSave">保存</button>`;
}

function renderBoards() {
  Object.values(statusLayers).forEach(l => l.clearLayers());
  boards.forEach(b => {
    const st = statusOf(b.status);
    const m = L.circleMarker([b.lat, b.long], {
      radius: 9, color: "#333", weight: 1, fillColor: st.color, fillOpacity: 0.92,
    }).addTo(statusLayers[st.label]);
    m.bindPopup(() => popupHtml(b));
    m.on("popupopen", (e) => {
      const node = e.popup.getElement();
      node.querySelector("#pSave").onclick = () => {
        b.status = Number(node.querySelector("#pStatus").value);
        b.note = node.querySelector("#pNote").value.trim();
        persist();
        map.closePopup();
        renderBoards();
      };
    });
  });
  renderStats();
}

function persist() {
  if (usingSample) {
    const edits = {};
    boards.forEach(b => { if (b.status !== 0 || b.note) edits[b.id] = { status: b.status, note: b.note }; });
    saveLocal(KEY_EDITS, edits);
  } else {
    saveLocal(KEY_BOARDS, boards);
  }
}

/* CSV読込: 列名で判定(name/名称, address/住所, lat/緯度, long|lng/経度, status, note/メモ) */
const COL = {
  id: ["id", "ID", "番号"], name: ["name", "名称", "掲示場名", "設置場所"],
  address: ["address", "住所", "所在地"], lat: ["lat", "latitude", "緯度"],
  long: ["long", "lng", "longitude", "経度"], status: ["status", "ステータス", "状態"],
  note: ["note", "メモ", "備考"],
};
function findCol(header, keys) {
  return header.findIndex(h => keys.includes(h.trim()));
}
onFileSelected(document.getElementById("csvIn"), (text) => {
  const rows = parseCsv(text);
  if (rows.length < 2) return alert("CSVにデータ行がありません");
  const head = rows[0];
  const ix = {};
  for (const k in COL) ix[k] = findCol(head, COL[k]);
  if (ix.lat < 0 || ix.long < 0) return alert("緯度(lat)・経度(long)の列が見つかりません。ヘッダー行を確認してください。");
  const loaded = [];
  rows.slice(1).forEach((r, i) => {
    const lat = parseFloat(r[ix.lat]), long = parseFloat(r[ix.long]);
    if (!isFinite(lat) || !isFinite(long)) return;
    loaded.push({
      id: ix.id >= 0 && r[ix.id] ? r[ix.id] : `R${i + 1}`,
      name: ix.name >= 0 ? r[ix.name] : `地点${i + 1}`,
      address: ix.address >= 0 ? r[ix.address] : "",
      lat, long,
      status: ix.status >= 0 ? (Number(r[ix.status]) || 0) : 0,
      note: ix.note >= 0 ? r[ix.note] : "",
    });
  });
  if (!loaded.length) return alert("有効な座標の行がありません");
  boards = loaded;
  usingSample = false;
  persist();
  document.getElementById("sampleBar").style.display = "none";
  map.fitBounds(L.latLngBounds(boards.map(b => [b.lat, b.long])), { padding: [30, 30] });
  renderBoards();
});

document.getElementById("csvOut").onclick = () => {
  const rows = [["id", "name", "address", "lat", "long", "status", "statusLabel", "note"]];
  boards.forEach(b => rows.push([b.id, b.name, b.address, b.lat, b.long, b.status, statusOf(b.status).label, b.note]));
  downloadFile(`poster_boards_${todayStamp()}.csv`, "﻿" + toCsv(rows), "text/csv;charset=utf-8");
};

document.getElementById("resetBtn").onclick = () => {
  if (!confirm("保存済みのステータス・メモ・読込データをすべて消去してサンプルに戻します。よろしいですか?\n(必要ならまず「CSV書出」でバックアップしてください)")) return;
  localStorage.removeItem(KEY_BOARDS);
  localStorage.removeItem(KEY_EDITS);
  location.reload();
};

/* 起動: 保存済みデータ > サンプル+編集差分 */
(async function init() {
  const saved = loadLocal(KEY_BOARDS, null);
  if (saved && Array.isArray(saved) && saved.length) {
    boards = saved;
    usingSample = false;
    document.getElementById("sampleBar").style.display = "none";
    map.fitBounds(L.latLngBounds(boards.map(b => [b.lat, b.long])), { padding: [30, 30] });
  } else {
    if (Array.isArray(window.EMBEDDED_BOARDS)) {
      boards = window.EMBEDDED_BOARDS; // 配布用単一ファイル版はデータ同梱
    } else {
      const res = await fetch("data/boards.sample.json");
      boards = await res.json();
    }
    const edits = loadLocal(KEY_EDITS, {});
    boards.forEach(b => { if (edits[b.id]) Object.assign(b, edits[b.id]); });
  }
  renderBoards();
})();
</script>
